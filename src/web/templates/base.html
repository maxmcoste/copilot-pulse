<!DOCTYPE html>
<html lang="{{ lang | default('en') }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title | default("Copilot Pulse") }}</title>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="stylesheet" href="/static/css/dashboard.css?v=44">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <span class="logo">◈</span> Copilot Pulse
        </div>
        <div class="nav-links">
            <a href="/" class="{% if not active_tab %}active{% endif %}">{{ t.nav_dashboard }}</a>
            <a href="/maturity" class="{% if active_tab == 'maturity' %}active{% endif %}">{{ t.nav_maturity }}</a>
            <a href="/chat" class="{% if active_tab == 'chat' %}active{% endif %}">{{ t.nav_chat }}</a>
            <a href="/setup" class="{% if active_tab == 'setup' %}active{% endif %}">{{ t.nav_setup }}</a>
            <a href="/settings" class="{% if active_tab == 'settings' %}active{% endif %}">⚙ {{ t.nav_settings }}</a>
        </div>
        <div class="nav-info">
            {% if enterprise %}<span class="badge">{{ enterprise }}</span>{% endif %}
            {% if org %}<span class="badge badge-secondary">{{ org }}</span>{% endif %}
            <span class="lang-switcher">
                <a href="/set-lang?lang=en" class="lang-btn {% if lang == 'en' %}lang-active{% endif %}">EN</a>
                <a href="/set-lang?lang=it" class="lang-btn {% if lang == 'it' %}lang-active{% endif %}">IT</a>
            </span>
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <script>
        // Pass translations to JavaScript for dynamic content
        window.T = {{ t | tojson }};
    </script>
    <script src="/static/js/app.js?v=44"></script>
</body>
</html>
